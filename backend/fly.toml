# fly.toml app configuration file generated for quill-backend on 2026-03-13T16:46:27-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'quill-backend'
primary_region = 'yyz'

[build]

# Persistent SQLite at /data/app.db. Worksheets load from JSON only when DB is empty (first deploy).
# To add new worksheet JSON after that: run on the machine:
#   .venv/bin/python seed_worksheets.py --merge
# Or set secret MERGE_WORKSHEETS_JSON_ON_START=1 for one deploy, then remove it.
# One-time: fly volumes create quill_data --region yyz --size 1
[mounts]
  source = "quill_data"
  destination = "/data"
  processes = ["app"]

[env]
  QUILL_DATA_DIR = "/data"
  # First boot from legacy auth.json: student password is bcrypt(DEFAULT_STUDENT_PASSWORD); default "changeme".

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
